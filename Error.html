<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bugtoe Logo Only</title>

  <style>
    body {
      margin: 0;
      background: #ccc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .logo-wrapper {
      position: relative;
      width: 600px;
      height: 600px;
    }

    .logo-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .logo-main {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 85%;
      height: 85%;
      transform: translate(-50%, -50%);
      object-fit: contain;
      animation: sway 3s ease-in-out infinite;
      transform-origin: center center;
    }

    @keyframes sway {
      0%   { transform: translate(-50%, -50%) rotate(0deg); }
      25%  { transform: translate(-50%, -50%) rotate(-8deg); }
      50%  { transform: translate(-50%, -50%) rotate(0deg); }
      75%  { transform: translate(-50%, -50%) rotate(8deg); }
      100% { transform: translate(-50%, -50%) rotate(0deg); }
    }
  </style>
</head>
  
<body>

  <div class="logo-wrapper">
    <img src="Bugtoelogoframe.png" class="logo-frame">
    <img src="Bugtoelogo.png" class="logo-main">
  </div>

</html>
