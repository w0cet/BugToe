<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bugtoe – Extra</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #444;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px 0;
  }

  /* BACK BUTTON */
  .back-button {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 40px;
    font-weight: bold;
    color: white;
    text-decoration: none;
    z-index: 9999;
    opacity: 0.8;
    transition: 0.2s;
  }

  .back-button:hover {
    opacity: 1;
  }

  .page-container {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .side-banner img {
    height: 450px;
    opacity: 0.95;
  }

  .menu-wrapper {
    background: #fff;
    width: 800px;
    padding: 40px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    text-align: center;
  }

  .site-title {
    font-family: "Papyrus", fantasy;
    font-size: 48px;
    margin-bottom: 10px;
  }

  .section-title {
    font-size: 32px;
    margin: 20px 0 20px;
    font-weight: bold;
  }

  /* IMAGE GRID */
  .image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 20px;
  }

  .image-item {
    text-align: center;
  }

  .image-item img {
    width: 100%;
    height: auto;
    border: 2px solid #000;
  }

  .caption {
    margin-top: 8px;
    font-size: 18px;
    font-weight: bold;
  }

  /* MOBILE VERSION */
  @media (max-width: 900px) {
    body {
      padding: 20px 0;
    }

    .page-container {
      flex-direction: column;
      gap: 10px;
    }

    .side-banner img {
      height: 200px;
    }

    .menu-wrapper {
      width: 90vw;
      max-width: 90vw;
      padding: 20px;
    }

    .back-button {
      font-size: 32px;
      top: 10px;
      left: 10px;
    }

    .image-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>
</head>

<body>

<!-- BACK BUTTON -->
<a href="index.html" class="back-button">← Home</a>

<div class="page-container">

  <div class="side-banner">
    <img src="key.png" alt="Key Banner">
  </div>

  <div class="menu-wrapper">

    <div class="site-title">bugtoe.com</div>

    <div class="section-title">Extra Photos / Files</div>

    <!-- IMAGE GRID WITH CAPTIONS -->
    <div class="image-grid">

      <!-- EXAMPLE ITEM — replace with your own -->
      <div class="image-item">
        <img src="img1.png" alt="">
        <div class="caption">Caption 1</div>
      </div>

      <div class="image-item">
        <img src="img2.png" alt="">
        <div class="caption">Caption 2</div>
      </div>

      <div class="image-item">
        <img src="img3.png" alt="">
        <div class="caption">Caption 3</div>
      </div>

      <div class="image-item">
        <img src="img4.png" alt="">
        <div class="caption">Caption 4</div>
      </div>

      <div class="image-item">
        <img src="img5.png" alt="">
        <div class="caption">Caption 5</div>
      </div>

      <div class="image-item">
        <img src="img6.png" alt="">
        <div class="caption">Caption 6</div>
      </div>

    </div>

  </div>

  <div class="side-banner">
    <img src="key.png" alt="Key Banner">
  </div>

</div>

</body>
</html>
