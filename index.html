<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KingsKey – Page 1</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #444; /* grey outer background */
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px 0;
  }

  .page-container {
    display: flex;

    text-align: center;
  }

  .site-title {
    font-family: "Papyrus", fantasy;
    font-size: 48px;
    margin-bottom: 10px;
  }

  .page-title {
    font-size: 28px;
    margin-bottom: 20px;
    font-weight: bold;
  }

  .comic-image {
    width: 100%;
    max-width: 550px; /* smaller but still big */
    margin: 20px 0;
    border: 2px solid #000;
  }

  .description {
    font-size: 18px;
    margin-top: 10px;
    margin-bottom: 30px;
  }

  .next {
    font-size: 32px;
    font-weight: bold;
    text-decoration: none;
    color: #000;
  }

  .next:hover {
    opacity: 0.6;
  }
</style>
</head>

<body>

<div class="page-container">

  <!-- LEFT SIDE BANNER -->
  <div class="side-banner">
    <img src="key.png" alt="Key Banner">

  <div class="comic-wrapper">

    <div class="site-title">bugtoe.com</div>

  <div class="side-banner">

</div>

</html>
