<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bugtoe – Page 1</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #444; /* grey outer background */
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px 0;
  }

  .comic-wrapper {
    background: #fff; /* white comic panel */
    width: 800px;
    padding: 40px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    text-align: center;
  }

  .site-title {
    font-family: "Papyrus", fantasy;
    font-size: 48px;
    margin-bottom: 10px;
  }

  .page-title {
    font-size: 28px;
    margin-bottom: 20px;
    font-weight: bold;
  }

  .comic-image {
    width: 100%;
    max-width: 700px;
    margin: 20px 0;
    border: 2px solid #000;
  }

  .description {
    font-size: 18px;
    margin-top: 10px;
    margin-bottom: 30px;
  }

  .next {
    font-size: 32px;
    font-weight: bold;
    text-decoration: none;
    color: #000;
  }

  .next:hover {
    opacity: 0.6;
  }
</style>
</head>

<body>

<div class="comic-wrapper">

  <div class="site-title">bugtoe.com</div>

  <div class="page-title">Page 1 – The Beginning</div>

  <img src="Page1.png" alt="Comic Page" class="comic-image">

  <div class="description">

  </div>

  <a class="next" href="page2.html">==></a>
