<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bugtoe Logo Animation</title>

  <style>
    body {
      margin: 0;
      background: #ccc;
      font-family: sans-serif;

      /* STACK EVERYTHING VERTICALLY */
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }

    .logo-wrapper {
      position: relative;
      width: 420px;
      height: 420px;
    }

    .logo-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .logo-main {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 85%;
      height: 85%;
      transform: translate(-50%, -50%);
      object-fit: contain;
    }

    .left-box {
      margin-top: 40px;
      padding: 20px 30px;
      background: #fff;
      border: 6px solid black;
      transform: rotate(-2deg);
    }

    .title {
      font-size: 40px;
      color: green;
    }

    .subtext {
      font-size: 26px;
      color: yellow;
      text-shadow: 2px 2px 0 black;
    }
  </style>
</head>

<body>

  <div class="logo-wrapper">
    <img src="Bugtoelogoframe.png" class="logo-frame">
    <img src="Bugtoelogo.png" class="logo-main">
  </div>

  <div class="left-box">
    <div class="title">Daily Bug-gle</div>
    <div class="subtext">Your editable yellow text here</div>
  </div>

</body>
</html>
