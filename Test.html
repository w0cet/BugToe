<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bugtoe Logo Only</title>

<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #ccc; /* base gray */

    /* Positioning for aurora overlay */
    position: relative;
    overflow: hidden;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

/* 🌌 Aurora container */
.aurora {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: -1;
}

/* 🟢🟡 Solid green/yellow sideways worms */
.beam {
  position: absolute;
  height: 10vh;
  width: 100%;
  background: linear-gradient(
    to right,
    rgba(0, 255, 0, 0.7),
    rgba(255, 255, 0, 0.7),
    rgba(0, 255, 0, 0.7)
  );

  /* Less foggy, more solid */
  filter: blur(10px);
  opacity: 0.9;

  /* Random-ish starting positions */
  left: calc(10% + (80% * var(--rand-x)));
  top: calc(10% + (80% * var(--rand-y)));

  animation: wiggleSideways 5s ease-in-out infinite alternate;
}

/* 🌊 Stronger sideways wiggle */
@keyframes wiggleSideways {
  0%   { transform: translateX(0) translateY(0) skewY(0deg); }
  20%  { transform: translateX(40px) translateY(-20px) skewY(6deg); }
  45%  { transform: translateX(-30px) translateY(15px) skewY(-5deg); }
  70%  { transform: translateX(50px) translateY(-10px) skewY(4deg); }
  100% { transform: translateX(0) translateY(0) skewY(0deg); }
}

/* Each worm gets its own random seed + speed */
.beam:nth-child(1) {
  --rand-x: 0.1;
  --rand-y: 0.2;
  animation-duration: 6s;
}

.beam:nth-child(2) {
  --rand-x: 0.6;
  --rand-y: 0.5;
  animation-duration: 7.5s;
}

.beam:nth-child(3) {
  --rand-x: 0.3;
  --rand-y: 0.8;
  animation-duration: 5.5s;
}
  /* Your existing logo + text styles stay the same */
  .logo-wrapper {
    position: relative;
    width: 600px;
    height: 600px;
    display: flex;
    justify-content: center;
  }

  .logo-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .logo-main {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 85%;
    height: 85%;
    transform: translate(-50%, -50%);
    object-fit: contain;
    animation: sway 3s ease-in-out infinite;
    transform-origin: center center;
  }

  @keyframes sway {
    0%   { transform: translate(-50%, -50%) rotate(0deg); }
    25%  { transform: translate(-50%, -50%) rotate(-8deg); }
    50%  { transform: translate(-50%, -50%) rotate(0deg); }
    75%  { transform: translate(-50%, -50%) rotate(8deg); }
    100% { transform: translate(-50%, -50%) rotate(0deg); }
  }

  .text-block {
    margin-top: 20px;
    text-align: center;
    width: 100%;
  }
</style>
</head>

  
<body>

<div class="aurora">
  <div class="beam"></div>
  <div class="beam"></div>
  <div class="beam"></div>
</div>
  
  <div class="logo-wrapper">
    <img src="Bugtoelogoframe.png" class="logo-frame">
    <img src="Bugtoelogo.png" class="logo-main">
  </div>

<div class="text-block">
  <b style="font-size: 40px;">Welcome to BugToe,</b><br>
  <i style="font-size: 30px;">We have webcomics, About the creator, and MORE!!! :D</i><br>
  <i style="font-size: 20px;">-</i><br>
  <b style="font-size: 40px;">Links!!!</b>
</div>
</body>
</html>
