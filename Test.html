<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bugtoe Logo Only</title>

<style>
  body {
    margin: 0;
    min-height: 100vh;

    /* 🔥 Animated green + yellow tint over gray */
    background: linear-gradient(
      120deg,
      rgba(0, 255, 0, 0.15),
      rgba(255, 255, 0, 0.15),
      #ccc,
      #ccc
    );
    background-size: 300% 300%;
    animation: bgMove 12s ease-in-out infinite;

    /* layout */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

  @keyframes bgMove {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .logo-wrapper {
    position: relative;
    width: 600px;
    height: 600px;

    /* MAKE LOGO TAKE FULL WIDTH so nothing sits beside it */
    display: flex;
    justify-content: center;
  }

  .logo-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .logo-main {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 85%;
    height: 85%;
    transform: translate(-50%, -50%);
    object-fit: contain;
    animation: sway 3s ease-in-out infinite;
    transform-origin: center center;
  }

  @keyframes sway {
    0%   { transform: translate(-50%, -50%) rotate(0deg); }
    25%  { transform: translate(-50%, -50%) rotate(-8deg); }
    50%  { transform: translate(-50%, -50%) rotate(0deg); }
    75%  { transform: translate(-50%, -50%) rotate(8deg); }
    100% { transform: translate(-50%, -50%) rotate(0deg); }
  }

  .text-block {
    margin-top: 20px;
    text-align: center;
    width: 100%;
  }
</style>
</head>

  
<body>

  <div class="logo-wrapper">
    <img src="Bugtoelogoframe.png" class="logo-frame">
    <img src="Bugtoelogo.png" class="logo-main">
  </div>

<div class="text-block">
  <b style="font-size: 40px;">Welcome to BugToe,</b><br>
  <i style="font-size: 30px;">We have webcomics, About the creator, and MORE!!! :D</i><br>
  <i style="font-size: 20px;">-</i><br>
  <b style="font-size: 40px;">Links!!!</b>
</div>
</body>
</html>
