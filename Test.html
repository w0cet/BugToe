<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bugtoe Logo Animation</title>

  <style>
    @font-face {
      font-family: 'Showcard Gothic';
      src: local('Showcard Gothic'), local('ShowcardGothic');
    }

    body {
      margin: 0;
      background: #ccc;
      font-family: sans-serif;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* LOGO */
    .logo-wrapper {
      position: relative;
      width: 600px;
      height: 600px;
      margin-top: -20px;
    }

    .logo-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .logo-main {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 85%;
      height: 85%;
      transform: translate(-50%, -50%);
      object-fit: contain;
      animation: sway 3s ease-in-out infinite;
      transform-origin: center center;
    }

    @keyframes sway {
      0%   { transform: translate(-50%, -50%) rotate(0deg); }
      25%  { transform: translate(-50%, -50%) rotate(-8deg); }
      50%  { transform: translate(-50%, -50%) rotate(0deg); }
      75%  { transform: translate(-50%, -50%) rotate(8deg); }
      100% { transform: translate(-50%, -50%) rotate(0deg); }
    }

    /* BOOKNOTES TITLE */
    .booknotes-title {
      font-family: 'Showcard Gothic', sans-serif;
      font-size: 60px;
      color: green;
      margin-top: 10px;
      margin-bottom: 10px;
      transform: rotate(-2deg);
    }

    /* DAILY BUG-GLE BOX */
    .left-box {
      margin-top: 10px;
      width: fit-content;

      /* Move left but NOT centered */
      align-self: flex-start;
      margin-left: 40px;

      padding: 30px 40px;
      background: #fff;
      border: 6px solid black;
      transform: rotate(-2deg);
      animation: bounce 2.5s ease-in-out infinite;
      box-shadow: 6px 6px 0px rgba(0,0,0,0.4);
    }

    @keyframes bounce {
      0%   { transform: rotate(-2deg) translateY(0); }
      50%  { transform: rotate(-2deg) translateY(-10px); }
      100% { transform: rotate(-2deg) translateY(0); }
    }

    .title {
      font-family: 'Showcard Gothic', sans-serif;
      font-size: 55px;
      color: green;
      margin-bottom: 10px;
    }

    .subtext {
      font-family: 'Showcard Gothic', sans-serif;
      font-size: 32px;
      color: yellow;
      text-shadow: 2px 2px 0 black;
    }

    /* GOOGLE LINK — moved left */
    .google-link {
      margin-top: 15px;
      margin-left: 60px; /* move link left */
      align-self: flex-start;

      font-size: 28px;
      font-family: 'Showcard Gothic', sans-serif;
      color: blue;
    }

    .google-link a {
      color: blue;
      text-decoration: underline;
    }

  </style>
</head>

<body>

  <!-- LOGO -->
  <div class="logo-wrapper">
    <img src="Bugtoelogoframe.png" class="logo-frame">
    <img src="Bugtoelogo.png" class="logo-main">
  </div>

  <!-- BOOKNOTES TITLE -->
  <div class="booknotes-title">Booknotes</div>

  <!-- DAILY BUG-GLE BOX -->
  <div class="left-box">
    <div class="title">Daily Bug-gle</div>
    <div class="subtext">Your editable yellow text here</div>
  </div>

  <!-- GOOGLE LINK -->
  <div class="google-link">
    <a href="https://www.google.com" target="_blank">Go to Google</a>
  </div>

</body>
</html>
