<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bugtoe Logo Only</title>

<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #ccc; /* base gray */

    /* Positioning for aurora overlay */
    position: relative;
    overflow: hidden;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

/* 🌌 Aurora container */
.aurora {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: -1;
}

/* 🟢🟡 Green + yellow sideways wiggly beams */
.beam {
  position: absolute;
  left: 0;
  height: 12vh;
  width: 100%;
  background: linear-gradient(
    to right,
    rgba(0, 255, 0, 0.35),
    rgba(255, 255, 0, 0.35),
    rgba(0, 255, 0, 0.35)
  );
  filter: blur(35px);
  opacity: 0.7;

  animation: wiggleSideways 7s ease-in-out infinite alternate;
}

/* 🌊 Sideways wiggly motion */
@keyframes wiggleSideways {
  0%   { transform: translateY(0) skewY(0deg); }
  20%  { transform: translateY(-25px) skewY(4deg); }
  45%  { transform: translateY(15px) skewY(-3deg); }
  70%  { transform: translateY(-20px) skewY(2deg); }
  100% { transform: translateY(0) skewY(0deg); }
}

/* Position each beam at different heights + speeds */
.beam:nth-child(1) {
  top: 20%;
  animation-duration: 6s;
}

.beam:nth-child(2) {
  top: 50%;
  animation-duration: 8s;
}

.beam:nth-child(3) {
  top: 75%;
  animation-duration: 7s;
}

  /* Your existing logo + text styles stay the same */
  .logo-wrapper {
    position: relative;
    width: 600px;
    height: 600px;
    display: flex;
    justify-content: center;
  }

  .logo-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .logo-main {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 85%;
    height: 85%;
    transform: translate(-50%, -50%);
    object-fit: contain;
    animation: sway 3s ease-in-out infinite;
    transform-origin: center center;
  }

  @keyframes sway {
    0%   { transform: translate(-50%, -50%) rotate(0deg); }
    25%  { transform: translate(-50%, -50%) rotate(-8deg); }
    50%  { transform: translate(-50%, -50%) rotate(0deg); }
    75%  { transform: translate(-50%, -50%) rotate(8deg); }
    100% { transform: translate(-50%, -50%) rotate(0deg); }
  }

  .text-block {
    margin-top: 20px;
    text-align: center;
    width: 100%;
  }
</style>
</head>

  
<body>

<div class="aurora">
  <div class="beam"></div>
  <div class="beam"></div>
  <div class="beam"></div>
</div>
  
  <div class="logo-wrapper">
    <img src="Bugtoelogoframe.png" class="logo-frame">
    <img src="Bugtoelogo.png" class="logo-main">
  </div>

<div class="text-block">
  <b style="font-size: 40px;">Welcome to BugToe,</b><br>
  <i style="font-size: 30px;">We have webcomics, About the creator, and MORE!!! :D</i><br>
  <i style="font-size: 20px;">-</i><br>
  <b style="font-size: 40px;">Links!!!</b>
</div>
</body>
</html>
