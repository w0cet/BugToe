<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bugtoe Logo Only</title>

<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #ccc; /* base gray */

    /* Positioning for aurora overlay */
    position: relative;
    overflow: hidden;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

/* 🌌 Aurora container */
.aurora {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: -1;
  overflow: hidden;
}

/* Each worm is a full-width SVG line */
.worm {
  position: absolute;
  width: 100%;
  height: 12vh;
  left: 0;
  fill: none;
}

/* Green → yellow glowing line */
.worm path {
  stroke: url(#auroraGradient);
  stroke-width: 35;
  stroke-linecap: round;
  filter: drop-shadow(0 0 15px rgba(255,255,0,0.6));
  animation: wiggle 6s ease-in-out infinite;
}

/* Actual wiggly motion */
@keyframes wiggle {
  0%   { d: path("M0 100 Q 250 60 500 100 T 1000 100"); }
  25%  { d: path("M0 100 Q 250 140 500 80 T 1000 120"); }
  50%  { d: path("M0 100 Q 250 40 500 120 T 1000 90"); }
  75%  { d: path("M0 100 Q 250 130 500 60 T 1000 110"); }
  100% { d: path("M0 100 Q 250 60 500 100 T 1000 100"); }
}

/* Different vertical positions + speeds */
.worm:nth-child(1) {
  top: 20%;
  animation-duration: 7s;
}

.worm:nth-child(2) {
  top: 50%;
  animation-duration: 6s;
}

.worm:nth-child(3) {
  top: 75%;
  animation-duration: 8s;
}  /* Your existing logo + text styles stay the same */
  .logo-wrapper {
    position: relative;
    width: 600px;
    height: 600px;
    display: flex;
    justify-content: center;
  }

  .logo-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .logo-main {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 85%;
    height: 85%;
    transform: translate(-50%, -50%);
    object-fit: contain;
    animation: sway 3s ease-in-out infinite;
    transform-origin: center center;
  }

  @keyframes sway {
    0%   { transform: translate(-50%, -50%) rotate(0deg); }
    25%  { transform: translate(-50%, -50%) rotate(-8deg); }
    50%  { transform: translate(-50%, -50%) rotate(0deg); }
    75%  { transform: translate(-50%, -50%) rotate(8deg); }
    100% { transform: translate(-50%, -50%) rotate(0deg); }
  }

  .text-block {
    margin-top: 20px;
    text-align: center;
    width: 100%;
  }
</style>
</head>

  
<body>

  <div class="aurora">
  <svg class="worm" viewBox="0 0 1000 200" preserveAspectRatio="none">
    <path d="" />
  </svg>

  <svg class="worm" viewBox="0 0 1000 200" preserveAspectRatio="none">
    <path d="" />
  </svg>

  <svg class="worm" viewBox="0 0 1000 200" preserveAspectRatio="none">
    <path d="" />
  </svg>
</div>

  <svg width="0" height="0">
  <defs>
    <linearGradient id="auroraGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0,255,0,0.9)" />
      <stop offset="50%" stop-color="rgba(255,255,0,0.9)" />
      <stop offset="100%" stop-color="rgba(0,255,0,0.9)" />
    </linearGradient>
  </defs>
</svg>
  
  <div class="logo-wrapper">
    <img src="Bugtoelogoframe.png" class="logo-frame">
    <img src="Bugtoelogo.png" class="logo-main">
  </div>

<div class="text-block">
  <b style="font-size: 40px;">Welcome to BugToe,</b><br>
  <i style="font-size: 30px;">We have webcomics, About the creator, and MORE!!! :D</i><br>
  <i style="font-size: 20px;">-</i><br>
  <b style="font-size: 40px;">Links!!!</b>
</div>
</body>
</html>
