<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bugtoe Logo Only</title>

<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #ccc; /* base gray */

    /* Positioning for aurora overlay */
    position: relative;
    overflow: hidden;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

  /* 🌌 Aurora beams container */
  .aurora {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: -1;
  }

  /* 🌈 Individual beams */
  .beam {
    position: absolute;
    top: 0;
    width: 12vw;
    height: 100%;
    background: linear-gradient(
      to bottom,
      rgba(0, 255, 180, 0.25),
      rgba(0, 120, 255, 0.25),
      rgba(180, 0, 255, 0.25)
    );
    filter: blur(40px);
    animation: wiggle 6s ease-in-out infinite alternate;
    opacity: 0.7;
  }

  /* 🌊 Wiggly motion */
  @keyframes wiggle {
    0%   { transform: translateX(0) skewX(0deg); }
    25%  { transform: translateX(-20px) skewX(-4deg); }
    50%  { transform: translateX(10px) skewX(3deg); }
    75%  { transform: translateX(-15px) skewX(-2deg); }
    100% { transform: translateX(0) skewX(0deg); }
  }

  /* You can duplicate beams for more density */
  .beam:nth-child(1) { left: 10%; animation-duration: 7s; }
  .beam:nth-child(2) { left: 30%; animation-duration: 5.5s; }
  .beam:nth-child(3) { left: 55%; animation-duration: 6.5s; }
  .beam:nth-child(4) { left: 75%; animation-duration: 5s; }

  /* Your existing logo + text styles stay the same */
  .logo-wrapper {
    position: relative;
    width: 600px;
    height: 600px;
    display: flex;
    justify-content: center;
  }

  .logo-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .logo-main {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 85%;
    height: 85%;
    transform: translate(-50%, -50%);
    object-fit: contain;
    animation: sway 3s ease-in-out infinite;
    transform-origin: center center;
  }

  @keyframes sway {
    0%   { transform: translate(-50%, -50%) rotate(0deg); }
    25%  { transform: translate(-50%, -50%) rotate(-8deg); }
    50%  { transform: translate(-50%, -50%) rotate(0deg); }
    75%  { transform: translate(-50%, -50%) rotate(8deg); }
    100% { transform: translate(-50%, -50%) rotate(0deg); }
  }

  .text-block {
    margin-top: 20px;
    text-align: center;
    width: 100%;
  }
</style>
</head>

  
<body>

<div class="aurora">
  <div class="beam"></div>
  <div class="beam"></div>
  <div class="beam"></div>
  <div class="beam"></div>
</div>
  
  <div class="logo-wrapper">
    <img src="Bugtoelogoframe.png" class="logo-frame">
    <img src="Bugtoelogo.png" class="logo-main">
  </div>

<div class="text-block">
  <b style="font-size: 40px;">Welcome to BugToe,</b><br>
  <i style="font-size: 30px;">We have webcomics, About the creator, and MORE!!! :D</i><br>
  <i style="font-size: 20px;">-</i><br>
  <b style="font-size: 40px;">Links!!!</b>
</div>
</body>
</html>
