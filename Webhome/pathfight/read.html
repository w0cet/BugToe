<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>- Bugtoe - Webcomics -</title>

<style>
  .text-block b,
  .text-block i {
    color: white;
  }

  /* Aurora background */
  .aurora {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: -1;
  }

  .worm {
    position: absolute;
    width: 100%;
    height: 10vh;
    left: 0;
    fill: none;
  }

  .worm path {
    stroke: url(#auroraGradient);
    stroke-width: 120;
    stroke-linecap: round;
    opacity: 0.35;
    filter: drop-shadow(0 0 35px rgba(255,255,0,0.6))
            drop-shadow(0 0 25px rgba(0,255,0,0.6));
    animation: wiggle 8s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%   { d: path("M0 100 Q 200 60 500 100 T 1000 100"); }
    25%  { d: path("M0 100 Q 200 140 500 80 T 1000 120"); }
    50%  { d: path("M0 100 Q 200 40 500 120 T 1000 90"); }
    75%  { d: path("M0 100 Q 200 130 500 60 T 1000 110"); }
    100% { d: path("M0 100 Q 200 60 500 100 T 1000 100"); }
  }

  .worm:nth-child(1) { top: 22%; animation-duration: 9s; }
  .worm:nth-child(2) { top: 50%; animation-duration: 7s; }
  .worm:nth-child(3) { top: 78%; animation-duration: 10s; }

  /* Cursors */
  body {
    padding-bottom: 400px;
    cursor: url('Bugg.png') 0 0, auto;
    margin: 0;
    min-height: 100vh;
    background: #045200;
    display: block;
    position: relative;
    overflow-y: auto;
  }

  .interactive:hover {
    cursor: url('BuggHover.png') 0 0, auto;
  }

  .interactive:active {
    cursor: url('BuggClick.png') 0 0, auto !important;
  }

  .text-block {
    margin-top: 20px;
    text-align: center;
    width: 100%;
  }
</style>
</head>

<body>

<!-- Aurora worms -->
<div class="aurora">
  <svg class="worm" viewBox="0 0 1000 200" preserveAspectRatio="none"><path d="" /></svg>
  <svg class="worm" viewBox="0 0 1000 200" preserveAspectRatio="none"><path d="" /></svg>
  <svg class="worm" viewBox="0 0 1000 200" preserveAspectRatio="none"><path d="" /></svg>
</div>

<!-- Gradient definition -->
<svg width="0" height="0">
  <defs>
    <linearGradient id="auroraGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0,255,0,1)" />
      <stop offset="50%" stop-color="rgba(255,255,0,1)" />
      <stop offset="100%" stop-color="rgba(0,255,0,1)" />
    </linearGradient>
  </defs>
</svg>

<!-- Comic container -->
<div class="text-block" id="comic-container"></div>

<script>
  /* ============================
     COMIC PAGE DATA
     Add new pages here!
  ============================ */
  const comicPages = [
    {
      img: "S1.png",
      text: [
        "A human male appeared.",
        "",
        "He holds a crown, cape and some sticks that ravel his crown... He MUST be important"
      ]
    },
    {
      img: "S2.png",
      text: [
        "Welp its time to go, Im a busy man after all..."
      ]
    },
    {
      img: "S3.png",
      text: [
        "But first...",
        "",
        "yoink!"
      ]
    },
    {
      img: "S4.png",
      text: [
        "Ive been needing a new weapon"
      ]
    },
    {
      img: "S5.png",
      text: [
        "There..."
      ]
    },
    {
      img: "S6.png",
      text: [
        "Its heavy... PERFECT!!!!"
      ]
    },
    {
      img: "S7.png",
      text: [
        "Im going to miss this place."
      ]
    },
    {
      img: "S8.png",
      text: [
        "S w i n g"
      ]
    },
    {
      img: "S9.png",
      text: [
        "Climbing is so hard for me nowdays, not only is the sun buring hot"
      ]
    },
    {
      img: "S10.png",
      text: [
        "And with my age... man my back allready hurts, funny how i ask for a big ol' hammer."
      ]
    },
    // Add more pages here
  ];

  /* ============================
     PAGE LOADER
  ============================ */
  const urlParams = new URLSearchParams(window.location.search);
  let page = parseInt(urlParams.get("page")) || 1;

  function renderPage() {
    const data = comicPages[page - 1];
    const container = document.getElementById("comic-container");

    if (!data) {
      container.innerHTML = "<b style='font-size:40px;color:white;'>Page not found.</b>";
      return;
    }

    let html = `
      <b style="font-size: 40px;">Webcomics!</b><br><br>
      <b style="font-size: 40px;">PathFight</b><br><br>

      <img src="${data.img}" style="display:block;margin:0 auto;"><br>
    `;

    data.text.forEach(line => {
      html += `<b style="font-size:20px;">${line}</b><br><br>`;
    });

    html += `
      <div style="margin-top:20px;">
        ${page > 1 ? `<a href="?page=${page - 1}" class="interactive" style="font-size:30px;color:yellow;">&lt;==</a>` : ""}
        ${page < comicPages.length ? `<a href="?page=${page + 1}" class="interactive" style="font-size:30px;color:yellow;">==&gt;</a>` : ""}
      </div>
    `;

    container.innerHTML = html;
  }

  renderPage();
</script>

</body>
</html>
