<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>- Bugtoe - Webcomics -</title>

<style>

  .text-block b,
.text-block i {
  color: white;
}
  
/* ------------------------------
   AURORA WIGGLY LINES
--------------------------------*/
.aurora {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: -1;
}

/* Full-width SVG worms */
.worm {
  position: absolute;
  width: 100%;
  height: 10vh;
  left: 0;
  fill: none;
}

/* More colourful green/yellow + subtle */
.worm path {
  stroke: url(#auroraGradient);
  stroke-width: 120;
  stroke-linecap: round;
  opacity: 0.35; /* ~30% */
  filter: drop-shadow(0 0 35px rgba(255,255,0,0.6))
          drop-shadow(0 0 25px rgba(0,255,0,0.6));
  animation: wiggle 8s ease-in-out infinite;
}

/* Smooth, stable wiggle */
@keyframes wiggle {
  0%   { d: path("M0 100 Q 200 60 500 100 T 1000 100"); }
  25%  { d: path("M0 100 Q 200 140 500 80 T 1000 120"); }
  50%  { d: path("M0 100 Q 200 40 500 120 T 1000 90"); }
  75%  { d: path("M0 100 Q 200 130 500 60 T 1000 110"); }
  100% { d: path("M0 100 Q 200 60 500 100 T 1000 100"); }
}

/* Spread them out so they don’t overlap weirdly */
.worm:nth-child(1) {
  top: 22%;
  animation-duration: 9s;
}

.worm:nth-child(2) {
  top: 50%;
  animation-duration: 7s;
}

.worm:nth-child(3) {
  top: 78%;
  animation-duration: 10s;
}
/* ------------------------------
   CURSORS
--------------------------------*/
body {
 
  padding-bottom: 400px;
  cursor: url('Bugg.png') 0 0, auto;
}

.interactive:hover {
  cursor: url('BuggHover.png') 0 0, auto;
}

/ CLICK CURSOR — works instantly */
.interactive:active {
  cursor: url('BuggClick.png') 0 0, auto !important;
}


/* ------------------------------
   PAGE LAYOUT
--------------------------------*/
body {
  margin: 0;
  min-height: 100vh;
  background: #045200;

  display: block; /* ← THIS FIXES SCROLLING */

  position: relative;
  overflow-y: auto; /* ← allows scrolling */
}
  
.logo-wrapper {
  margin-left: auto;
  margin-right: auto;
  position: relative;
  width: 600px;
  height: 600px;
  display: flex;
  justify-content: center;
}

.logo-frame {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.logo-main {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 85%;
  height: 85%;
  transform: translate(-50%, -50%);
  object-fit: contain;
  animation: sway 3s ease-in-out infinite;
  transform-origin: center center;
}

@keyframes sway {
  0%   { transform: translate(-50%, -50%) rotate(0deg); }
  25%  { transform: translate(-50%, -50%) rotate(-8deg); }
  50%  { transform: translate(-50%, -50%) rotate(0deg); }
  75%  { transform: translate(-50%, -50%) rotate(8deg); }
  100% { transform: translate(-50%, -50%) rotate(0deg); }
}

.text-block {
  margin-top: 20px;
  text-align: center;
  width: 100%;
}

</style>
</head>

<body>

<!-- Aurora worms -->
<div class="aurora">
  <svg class="worm" viewBox="0 0 1000 200" preserveAspectRatio="none"><path d="" /></svg>
  <svg class="worm" viewBox="0 0 1000 200" preserveAspectRatio="none"><path d="" /></svg>
  <svg class="worm" viewBox="0 0 1000 200" preserveAspectRatio="none"><path d="" /></svg>
</div>

<!-- Gradient definition -->
<svg width="0" height="0">
  <defs>
    <linearGradient id="auroraGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0,255,0,1)" />
      <stop offset="50%" stop-color="rgba(255,255,0,1)" />
      <stop offset="100%" stop-color="rgba(0,255,0,1)" />
    </linearGradient>
  </defs>
</svg>
